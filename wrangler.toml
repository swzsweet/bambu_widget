name = "bambu-widget-worker"
main = "src/index.js"
compatibility_date = "2026-07-07"
compatibility_flags = ["nodejs_compat"]

[vars]
# Set secrets with `npx wrangler secret put ...` instead of committing them here.
# BAMBU_SERIAL = "YOUR_PRINTER_SERIAL"
# BAMBU_REGION = "Global" # Global uses us.mqtt.bambulab.com; China uses cn.mqtt.bambulab.com
# CACHE_TTL_SECONDS = "20"
# REQUEST_TIMEOUT_MS = "10000"
